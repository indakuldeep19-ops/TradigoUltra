name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Create React Native project
        run: |
          npx react-native init TempProject --version 0.72.6
          cp -r TempProject/android .
          cp -r TempProject/ios . 2>/dev/null || true
          rm -rf TempProject
      - name: Copy your source files (overwrite with your code)
        run: |
          cp -r src . 2>/dev/null || true
          cp App.js . 2>/dev/null || true
      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tradigo-app
          path: android/app/build/outputs/apk/release/app-release.apk
