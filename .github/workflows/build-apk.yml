name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Create React Native project
        run: npx react-native init TradigoUltraTemp
      - name: Move files
        run: |
          cp -r TradigoUltraTemp/* .
          rm -rf TradigoUltraTemp
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: tradigo-app
          path: android/app/build/outputs/apk/release/app-release.apk
